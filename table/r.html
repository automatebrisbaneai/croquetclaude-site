<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Table — Room</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body class="thetable-root">

<header class="tt-header">
  <div class="tt-brand">
    <h1>The Table</h1>
    <span class="sub" id="room-title"></span>
  </div>
  <span class="tt-room-pill"><span class="lbl">room</span><span id="room-code">—</span></span>
  <span class="tt-who">You are <b id="who-name">—</b></span>
</header>

<section class="tt-post">
  <div class="tt-post-card">
    <div class="tt-section-picker" role="group" aria-label="Section">
      <button class="tt-chip" data-section="update"   aria-pressed="true">Update</button>
      <button class="tt-chip" data-section="question" aria-pressed="false">Question</button>
      <button class="tt-chip" data-section="idea"     aria-pressed="false">Idea</button>
      <button class="tt-chip" data-section="todo"     aria-pressed="false">To do</button>
    </div>
    <textarea class="tt-textarea" id="post-body" placeholder="What's happening?" rows="2"></textarea>
    <div id="voice-interim"></div>
    <div class="tt-post-actions">
      <span class="tt-hint" id="voice-status"><kbd>⌘</kbd>/<kbd>Ctrl</kbd> + <kbd>Enter</kbd> to post</span>
      <div class="tt-post-buttons">
        <button id="voice-btn" type="button" aria-label="Record voice note"></button>
        <button class="tt-btn" id="post-btn">Post</button>
      </div>
    </div>
  </div>
</section>

<main class="tt-board" id="board">
  <div class="tt-col" data-section="question">
    <div class="tt-col-head">
      <h2 class="tt-col-title">Questions</h2>
      <span class="tt-col-count" data-count-for="question">0</span>
    </div>
    <div class="tt-col-cards" data-cards-for="question">
      <div class="tt-empty">No questions on the table.</div>
    </div>
  </div>

  <div class="tt-col" data-section="update">
    <div class="tt-col-head">
      <h2 class="tt-col-title">Updates</h2>
      <span class="tt-col-count" data-count-for="update">0</span>
    </div>
    <div class="tt-col-cards" data-cards-for="update">
      <div class="tt-empty">Nothing posted yet today.</div>
    </div>
  </div>

  <div class="tt-col" data-section="idea">
    <div class="tt-col-head">
      <h2 class="tt-col-title">Ideas</h2>
      <span class="tt-col-count" data-count-for="idea">0</span>
    </div>
    <div class="tt-col-cards" data-cards-for="idea">
      <div class="tt-empty">No ideas yet — first one wins.</div>
    </div>
  </div>

  <div class="tt-col" data-section="todo">
    <div class="tt-col-head">
      <h2 class="tt-col-title">To do</h2>
      <span class="tt-col-count" data-count-for="todo">0</span>
    </div>
    <div class="tt-col-cards" data-cards-for="todo">
      <div class="tt-empty">Nothing to do on the table.</div>
    </div>
  </div>
</main>

<div class="tt-toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
<script src="https://talk.croquetwade.com/shared/voice-to-text.js"></script>
<script src="./app.js"></script>

</body>
</html>
