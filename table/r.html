<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Table — Room</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css?v=20260515-1903">
</head>
<body class="thetable-root">

<header class="tt-header">
  <div class="tt-brand">
    <h1>The Table</h1>
    <span class="sub" id="room-title"></span>
  </div>
  <span class="tt-room-pill"><span class="lbl">room</span><span id="room-code">—</span></span>
  <span class="tt-who">You are <b id="who-name">—</b></span>
  <span class="tt-version">v 20260515-1903</span>
</header>

<section class="tt-post" id="tt-post">
  <button class="tt-post-pill" id="post-pill" type="button" aria-label="Add a note">
    <svg class="tt-pill-mic" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
    </svg>
    <span class="tt-pill-label">Post a note</span>
  </button>

  <div class="tt-post-card" id="post-composer">
    <textarea class="tt-textarea" id="post-body" placeholder="Headline first — then more detail on the next line (optional)" rows="3"></textarea>
    <div id="voice-interim"></div>
    <div class="tt-post-actions">
      <span class="tt-hint" id="voice-status"><kbd>⌘</kbd>/<kbd>Ctrl</kbd> + <kbd>Enter</kbd> to post</span>
      <div class="tt-post-buttons">
        <button id="voice-btn" type="button" aria-label="Record voice note"></button>
        <button class="tt-btn" id="post-btn">Post</button>
      </div>
    </div>
  </div>
</section>

<main class="tt-canvas" id="canvas">
  <div class="tt-empty" id="canvas-empty">Nothing on the table yet — drop the first note.</div>
</main>

<aside class="tt-drawer" id="drawer" hidden>
  <button class="tt-drawer-close" id="drawer-close" aria-label="Close">×</button>
  <div class="tt-drawer-card" id="drawer-card">
    <div class="tt-drawer-meta">
      <span class="tt-card-author" id="drawer-author" data-author=""></span>
      <span id="drawer-time" class="tt-drawer-time"></span>
    </div>
    <div class="tt-drawer-heading" id="drawer-heading"></div>
    <div class="tt-drawer-body" id="drawer-body"></div>
    <div class="tt-drawer-aims" id="drawer-aims"></div>
    <div class="tt-drawer-actions">
      <button class="tt-btn tt-btn-done" id="done-btn" type="button">Mark done</button>
    </div>
  </div>
  <div class="tt-drawer-replies">
    <h3>Replies</h3>
    <div class="tt-replies-list" id="replies-list"></div>
    <div class="tt-reply-input">
      <textarea id="reply-body" placeholder="Reply…" rows="2"></textarea>
      <button class="tt-btn" id="reply-btn">Reply</button>
    </div>
  </div>
</aside>

<!-- Done pile indicator — fixed bottom-right, hidden until there are done cards -->
<button class="tt-pile-btn tt-pile-btn--empty" id="pile-btn" type="button" aria-label="Done pile">
  Done pile&nbsp;<span class="tt-pile-n" id="pile-count"></span>
</button>

<!-- Done pile drawer — slides in from left -->
<aside class="tt-pile-drawer" id="pile-drawer" hidden>
  <div class="tt-pile-header">
    <h2>Done pile</h2>
    <button class="tt-drawer-close" id="pile-close" aria-label="Close pile">&#215;</button>
  </div>
  <div class="tt-pile-list" id="pile-list">
    <div class="tt-empty">Loading&#8230;</div>
  </div>
</aside>

<div class="tt-toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
<script src="https://talk.croquetwade.com/shared/voice-to-text.js"></script>
<script src="./app.js?v=20260515-1903"></script>

</body>
</html>
