<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadrant — CroquetClaude</title>
<meta name="description" content="A live, shared importance/urgency quadrant for meeting brainstorms.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Caveat:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════
   QUADRANT — Hand-drawn analog on paper.
   Reference: Wade's marker drawing.
   ════════════════════════════════════════════════════════════════ */
:root {
  /* Paper + ink */
  --paper:        #f4eedb;
  --paper-deep:   #ece4cc;
  --paper-edge:   #d8cea9;
  --ink:          #1a1612;
  --ink-soft:     #4d423a;
  --ink-faint:    #847565;
  --ink-line:     #2c241d;

  /* Quadrant inks (hand-mixed, not SaaS) */
  --do:           #b0451f;   /* sienna — Important + Urgent */
  --do-wash:      #e8b89c;
  --do-paper:     #ecc7a8;
  --plan:         #7d6428;   /* ochre — Important + Not urgent */
  --plan-wash:    #d9c787;
  --plan-paper:   #d8c780;
  --delegate:     #2d5d6a;   /* slate teal — Urgent + Not important */
  --delegate-wash:#b8cdd0;
  --delegate-paper:#bcd4d8;
  --drop:         #5a6438;   /* moss — Drop */
  --drop-wash:    #c4cca0;
  --drop-paper:   #cad19f;

  --accent:       #b0451f;   /* sienna pen */

  --font-display: 'Bricolage Grotesque', Georgia, serif;
  --font-body:    'Source Serif 4', 'Iowan Old Style', Georgia, serif;
  --font-hand:    'Caveat', 'Marker Felt', cursive;

  --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-paper:   cubic-bezier(0.65, 0, 0.35, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.45;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  letter-spacing: -0.005em;
}

/* Paper texture: layered noise + warm vignette + faint grid */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 30% 20%, rgba(255,243,210,0.55), transparent 60%),
    radial-gradient(ellipse 90% 80% at 70% 110%, rgba(180,150,90,0.18), transparent 60%),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
}
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='200' height='200'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.18 0 0 0 0 0.13 0 0 0 0 0.08 0 0 0 0.55 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.18;
  mix-blend-mode: multiply;
}
body > * { position: relative; z-index: 1; }

/* SVG roughen filter for hand-drawn lines (defined inline in body) */
.roughen { filter: url(#paper-rough); }

/* ════════════ HEADER ════════════ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 1rem 1.6rem 0.85rem;
  flex-shrink: 0;
  flex-wrap: wrap;
  border-bottom: 1px dashed rgba(26,22,18,0.18);
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 0.85rem;
}
.brand-mark {
  font-family: var(--font-display);
  font-size: 1.85rem;
  font-weight: 700;
  letter-spacing: -0.025em;
  font-variation-settings: 'opsz' 96;
  color: var(--ink);
  font-style: italic;
}
.brand-sub {
  font-family: var(--font-hand);
  font-size: 1.15rem;
  color: var(--ink-soft);
  letter-spacing: 0;
  transform: rotate(-1.5deg) translateY(2px);
  display: inline-block;
}

.controls { display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; }

/* "Live" tag — looks like a stamped wax label */
.live {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.32rem 0.75rem;
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 2px;
  box-shadow: 2px 2px 0 var(--ink);
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--do);
  box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--do);
  position: relative;
}
.live-dot::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  background: var(--do); opacity: 0.4;
  animation: ping 2.2s ease-out infinite;
}
@keyframes ping { 0% { transform: scale(0.8); opacity: 0.5; } 80%, 100% { transform: scale(2.4); opacity: 0; } }
.live.dead .live-dot { background: #b03a3a; box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px #b03a3a; }
.live.dead .live-dot::after { display: none; }

/* Room pill — like a manila tag */
.room-pill {
  display: inline-flex; align-items: center; gap: 0.45rem;
  padding: 0.35rem 0.75rem 0.35rem 0.6rem;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
  background: #e9dcad;
  border: 1.5px solid var(--ink);
  border-radius: 2px;
  box-shadow: 2px 2px 0 rgba(26,22,18,0.5);
}
.room-pill .label {
  font-family: var(--font-hand);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--ink-soft);
}

button.ctl {
  font: inherit;
  font-family: var(--font-display);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink);
  background: transparent;
  border: 1.5px solid var(--ink);
  cursor: pointer;
  padding: 0.38rem 0.8rem;
  border-radius: 2px;
  box-shadow: 2px 2px 0 var(--ink);
  transition: all 0.12s var(--ease-paper);
}
button.ctl:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
button.ctl:active { transform: translate(1px, 1px); box-shadow: 0 0 0 var(--ink); }
button.ctl.danger { color: var(--do); border-color: var(--do); box-shadow: 2px 2px 0 var(--do); }
button.ctl.danger:hover { box-shadow: 3px 3px 0 var(--do); }
button.ctl.danger:active { box-shadow: 0 0 0 var(--do); }

/* ════════════ INPUT ROW ════════════ */
.input-row {
  display: flex;
  gap: 0.7rem;
  padding: 0.95rem 1.6rem 0.95rem;
  flex-shrink: 0;
  align-items: stretch;
}
.input-wrap { flex: 1; position: relative; }
.input-row input {
  width: 100%;
  font: inherit;
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 500;
  padding: 0.78rem 1rem 0.7rem;
  background: rgba(255,250,232,0.85);
  color: var(--ink);
  border: 2px solid var(--ink);
  border-radius: 2px;
  outline: none;
  box-shadow: 3px 3px 0 var(--ink);
  transition: all 0.12s var(--ease-paper);
}
.input-row input::placeholder {
  color: var(--ink-faint);
  font-style: italic;
}
.input-row input:focus {
  background: #fffae8;
  box-shadow: 4px 4px 0 var(--accent);
  border-color: var(--accent);
  transform: translate(-1px, -1px);
}
.input-row button[type="submit"] {
  font: inherit;
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 2px;
  padding: 0 1.4rem;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--accent);
  transition: all 0.12s var(--ease-paper);
}
.input-row button[type="submit"]:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--accent); }
.input-row button[type="submit"]:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--accent); }

/* ════════════ MAIN GRID ════════════ */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 56px 1fr 280px;
  grid-template-rows: auto 50px;
  min-height: 0;
  padding: 0.4rem 1.1rem 1rem;
  gap: 0.8rem;
  overflow-y: auto;
}

/* AXES — drawn with SVG ink */
.axis-y, .axis-x {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.axis-y { grid-column: 1; grid-row: 1; }
.axis-x { grid-column: 2; grid-row: 2; }

.axis-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
/* Axis labels styled as writing on masking tape */
.axis-label {
  font-family: var(--font-hand);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.04em;
  pointer-events: none;
  z-index: 2;
  position: relative;
  display: inline-block;
  padding: 0.22rem 1rem 0.18rem;
  /* manila tape — warm tan with a fibre-like striation and very faint top/bottom shadow */
  background:
    repeating-linear-gradient(90deg,
      transparent 0,
      transparent 6px,
      rgba(120,90,40,0.05) 6px,
      rgba(120,90,40,0.05) 7px),
    linear-gradient(180deg, #ead09a 0%, #d8be7f 50%, #e3cb90 100%);
  border-top:    1px solid rgba(140,100,50,0.20);
  border-bottom: 1px solid rgba(140,100,50,0.20);
  box-shadow:
    0 2px 4px rgba(26,22,18,0.16),
    0 1px 0 rgba(255,250,220,0.20) inset;
  transform: rotate(-1.2deg);
}
.axis-y .axis-label {
  writing-mode: vertical-rl;
  transform: rotate(180deg) rotate(-1.2deg);
  text-align: center;
  padding: 1rem 0.22rem 1rem;
}

/* THE QUADRANT GRID */
.grid {
  grid-column: 2; grid-row: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 0;
  position: relative;
}

/* Hand-drawn cross dividing the grid */
.grid::before, .grid::after {
  content: '';
  position: absolute;
  background: var(--ink);
  z-index: 10;
  pointer-events: none;
}
.grid::before {
  /* horizontal line */
  left: -2%; right: -2%; top: calc(50% - 1.5px);
  height: 3px;
  border-radius: 2px;
  box-shadow: 0 0 0 1px rgba(244,238,219,0.4);
}
.grid::after {
  /* vertical line */
  top: -2%; bottom: -2%; left: calc(50% - 1.5px);
  width: 3px;
  border-radius: 2px;
  box-shadow: 0 0 0 1px rgba(244,238,219,0.4);
}

/* QUADRANTS — paper sheets with washed-ink fills */
.quadrant {
  position: relative;
  padding: 1.2rem 1.15rem 1rem;
  display: flex;
  flex-direction: column;
  min-height: 160px;
  transition: background 0.18s var(--ease-paper), box-shadow 0.18s var(--ease-paper);
}
.q-top-left    { background: linear-gradient(135deg, var(--plan-paper) 0%, color-mix(in oklab, var(--plan-paper), var(--paper) 35%) 100%); }
.q-top-right   { background: linear-gradient(225deg, var(--do-paper) 0%, color-mix(in oklab, var(--do-paper), var(--paper) 35%) 100%); }
.q-bottom-left { background: linear-gradient(45deg,  var(--drop-paper) 0%, color-mix(in oklab, var(--drop-paper), var(--paper) 35%) 100%); }
.q-bottom-right{ background: linear-gradient(315deg, var(--delegate-paper) 0%, color-mix(in oklab, var(--delegate-paper), var(--paper) 35%) 100%); }

.quadrant.drop-active {
  background-image: linear-gradient(0deg, rgba(176,69,31,0.10), rgba(176,69,31,0.10));
  box-shadow: inset 0 0 0 3px var(--accent);
}

.quadrant-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 0.85rem;
  flex-shrink: 0;
  gap: 0.5rem;
}
.quadrant-label {
  flex: 1; min-width: 0;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
}
.quadrant-meta { display: inline-flex; align-items: center; gap: 0.55rem; flex-shrink: 0; }
.quadrant-count {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  color: var(--ink);
  font-variation-settings: 'opsz' 96;
}
.quadrant-tag {
  font-family: var(--font-hand);
  font-size: 1.45rem;
  font-weight: 700;
  letter-spacing: 0.005em;
  line-height: 1;
  padding-top: 4px;
}
.q-top-right    .quadrant-tag { color: var(--do); }
.q-top-left     .quadrant-tag { color: var(--plan); }
.q-bottom-right .quadrant-tag { color: var(--delegate); }
.q-bottom-left  .quadrant-tag { color: var(--drop); }

/* Underline scribble under quadrant tag */
.quadrant-tag::after {
  content: '';
  display: block;
  height: 6px;
  margin-top: -2px;
  background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 6' preserveAspectRatio='none'%3E%3Cpath d='M2 4 Q15 1 35 3 T78 3' stroke='currentColor' stroke-width='1.4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-size: 100% 100%;
  opacity: 0.7;
}

.cards {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  padding-right: 4px;
  min-height: 0;
}
.tray-cards {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  overflow-y: auto;
  padding-right: 4px;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(26,22,18,0.25) transparent;
}
.cards::-webkit-scrollbar, .tray-cards::-webkit-scrollbar { width: 6px; }
.cards::-webkit-scrollbar-thumb, .tray-cards::-webkit-scrollbar-thumb { background: rgba(26,22,18,0.25); border-radius: 3px; }

/* ════════════ STICKY-NOTE CARDS ════════════ */
.card {
  --rot: 0deg;
  position: relative;
  align-self: flex-start;
  max-width: 100%;
  padding: 0.45rem 0.85rem 0.4rem;
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 500;
  line-height: 1.4;
  color: var(--ink);
  /* Light masking-tape — paler than the manila axis labels */
  background-image:
    repeating-linear-gradient(90deg,
      transparent 0,
      transparent 6px,
      rgba(120,90,40,0.045) 6px,
      rgba(120,90,40,0.045) 7px);
  background-color: #fdf6df;
  border: none;
  border-top:    1px solid rgba(140,100,50,0.16);
  border-bottom: 1px solid rgba(140,100,50,0.16);
  border-radius: 1px;
  cursor: grab;
  user-select: none;
  display: inline-flex;
  align-items: center;
  justify-content: flex-start;
  gap: 0.4rem;
  letter-spacing: -0.005em;
  transform: rotate(var(--rot));
  box-shadow:
    0 2px 3px rgba(26,22,18,0.14),
    0 1px 0 rgba(255,250,220,0.30) inset;
  transition:
    transform 0.18s var(--ease-spring),
    box-shadow 0.18s var(--ease-paper),
    opacity 0.18s var(--ease-out);
  flex-shrink: 0;
}

/* Per-quadrant card tape colour — lighter than the manila axis labels */
.q-top-right    .card { background-color: #fbe8d5; }   /* pale sienna */
.q-top-left     .card { background-color: #faf1c8; }   /* pale ochre */
.q-bottom-right .card { background-color: #d8e6e9; }   /* pale teal */
.q-bottom-left  .card { background-color: #e3eac1; }   /* pale moss */

.card:hover {
  --rot: 0deg;
  transform: rotate(0deg) translateY(-2px);
  box-shadow:
    2px 2px 0 rgba(26,22,18,0.95),
    4px 8px 16px -2px rgba(26,22,18,0.22);
  z-index: 4;
}
.card.dragging {
  opacity: 0.4;
  cursor: grabbing;
  transform: rotate(-2deg) scale(0.97);
}

/* Entry animation — only on freshly created cards */
.card.is-new { animation: cardIn 0.42s var(--ease-spring) both; }
@keyframes cardIn {
  0%   { opacity: 0; transform: rotate(var(--rot)) translateY(10px) scale(0.94); }
  60%  { opacity: 1; }
  100% { opacity: 1; transform: rotate(var(--rot)) translateY(0) scale(1); }
}
.card.removing { animation: cardOut 0.22s var(--ease-paper) forwards; }
@keyframes cardOut {
  0%   { opacity: 1; transform: rotate(var(--rot)) scale(1); }
  100% { opacity: 0; transform: rotate(var(--rot)) translateY(-6px) scale(0.92); }
}

.card-text { flex: 1; word-break: break-word; }

.card-del {
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1;
  width: 24px; height: 24px;
  border-radius: 50%;
  color: var(--ink-faint);
  display: inline-flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: all 0.14s var(--ease-paper);
  flex-shrink: 0;
}
.card:hover .card-del { opacity: 1; }
.card-del:hover { color: var(--do); background: rgba(176,69,31,0.12); transform: scale(1.15); }

/* ════════════ UNSORTED TRAY ════════════ */
.tray {
  grid-column: 3; grid-row: 1 / 3;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
  background: rgba(255,250,232,0.55);
  border: 2px dashed var(--ink);
  border-radius: 2px;
  position: relative;
}
.tray::before {
  content: 'INBOX';
  position: absolute;
  top: -10px;
  left: 1.1rem;
  background: var(--paper);
  padding: 0 0.55rem;
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--ink);
}
.tray.drop-active {
  border-style: solid;
  border-color: var(--accent);
  background: rgba(176,69,31,0.06);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.tray-head {
  padding: 1.2rem 1.15rem 0.65rem;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 0.5rem;
  border-bottom: 1px dashed rgba(26,22,18,0.18);
}
.tray-title {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.tray-hint {
  font-family: var(--font-hand);
  font-size: 1rem;
  color: var(--ink-soft);
}
.tray-cards { padding: 0.85rem 1.05rem 1rem; }

.empty-hint {
  font-family: var(--font-hand);
  font-size: 1.1rem;
  text-align: center;
  padding: 1.6rem 0.5rem;
  line-height: 1.5;
  color: var(--ink-soft);
  transform: rotate(-1deg);
}
.empty-hint .arrow {
  display: block;
  font-family: var(--font-display);
  font-size: 2.4rem;
  font-weight: 800;
  margin-bottom: 0.2rem;
  color: var(--accent);
  transform: rotate(2deg);
}

/* ════════════ TOAST ════════════ */
.toast {
  position: fixed;
  bottom: 1.5rem; left: 50%;
  transform: translate(-50%, 12px) rotate(-1.5deg);
  padding: 0.7rem 1.4rem;
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  background: var(--ink);
  color: var(--paper);
  border-radius: 2px;
  box-shadow: 3px 3px 0 var(--accent);
  opacity: 0;
  pointer-events: none;
  transition: all 0.28s var(--ease-paper);
  z-index: 100;
}
.toast.show { opacity: 1; transform: translate(-50%, 0) rotate(-1.5deg); }

/* Drag dim on non-active zones */
body.dragging .quadrant:not(.drop-active),
body.dragging .tray:not(.drop-active) { opacity: 0.65; }
body.dragging .quadrant, body.dragging .tray { transition: opacity 0.18s var(--ease-out); }

/* ════════════ MOBILE ════════════ */
@media (max-width: 760px) {
  body { font-size: 15px; }
  header {
    gap: 0.45rem;
    padding: 0.7rem 1rem 0.6rem;
  }
  .brand-mark { font-size: 1.45rem; }
  .brand-sub  { font-size: 1rem; }
  .live { font-size: 0.62rem; padding: 0.25rem 0.55rem; }
  .room-pill { font-size: 0.78rem; padding: 0.3rem 0.6rem 0.3rem 0.5rem; }
  .room-pill .label { font-size: 0.85rem; }
  button.ctl { font-size: 0.62rem; padding: 0.3rem 0.6rem; }

  .input-row { padding: 0.7rem 1rem; }
  .input-row input { font-size: 0.95rem; padding: 0.65rem 0.85rem; box-shadow: 2px 2px 0 var(--ink); }
  .input-row button[type="submit"] { font-size: 0.7rem; padding: 0 1rem; box-shadow: 2px 2px 0 var(--accent); }

  main {
    grid-template-columns: 36px 1fr;
    grid-template-rows: minmax(0, 1fr) 36px minmax(180px, 32vh);
    padding: 0.5rem 0.6rem 0.7rem;
    gap: 0.55rem;
  }
  .axis-y { grid-column: 1; grid-row: 1; }
  .axis-x { grid-column: 2; grid-row: 2; }
  .grid   { grid-column: 2; grid-row: 1; }
  .tray   { grid-column: 1 / 3; grid-row: 3; }
  .axis-label { font-size: 1.1rem; }

  .quadrant { padding: 0.85rem 0.85rem 0.7rem; }
  .quadrant-label { font-size: 0.66rem; letter-spacing: 0.1em; }
  .quadrant-tag { font-size: 1.15rem; padding-top: 2px; }
  .quadrant-count { font-size: 1.25rem; }

  .card { font-size: 0.88rem; padding: 0.6rem 0.4rem 0.6rem 0.75rem; }
  .card::before { width: 22px; height: 9px; top: -5px; }


  .tray::before { font-size: 0.6rem; left: 0.85rem; padding: 0 0.4rem; }
  .tray-head { padding: 0.95rem 0.95rem 0.55rem; }
  .tray-title { font-size: 0.9rem; }
  .tray-cards { padding: 0.7rem 0.85rem 0.85rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!-- SVG defs for hand-drawn filters -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="paper-rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="3" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
  </defs>
</svg>

<header>
  <div class="brand">
    <span class="brand-mark">Quadrant</span>
    <span class="brand-sub">importance × urgency</span>
  </div>
  <div class="controls">
    <span class="live" id="live"><span class="live-dot"></span><span id="live-text">live</span></span>
    <span class="room-pill"><span class="label">room</span><span id="room-name">—</span></span>
    <button class="ctl" id="copy-btn" title="Copy share link">Copy link</button>
    <button class="ctl" id="rename-btn" title="Switch room">Switch room</button>
    <button class="ctl danger" id="clear-btn" title="Clear all cards in this room">Clear</button>
  </div>
</header>

<form class="input-row" id="add-form" autocomplete="off">
  <div class="input-wrap">
    <input id="add-input" type="text" placeholder="Type a task and press Enter…" maxlength="280" required>
  </div>
  <button type="submit">Add</button>
</form>

<main>
  <div class="axis-y">
    <svg class="axis-svg" viewBox="0 0 56 600" preserveAspectRatio="none" aria-hidden="true">
      <g filter="url(#paper-rough)" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink)">
        <path d="M 28 580 L 28 30"/>
        <path d="M 18 42 L 28 22 L 38 42"/>
      </g>
    </svg>
    <span class="axis-label">Importance</span>
  </div>

  <div class="grid">
<div class="quadrant q-top-left" data-quadrant="not-urgent-important">
      <div class="quadrant-head">
        <span class="quadrant-label">Important · Not urgent</span>
        <span class="quadrant-meta">
          <span class="quadrant-count" data-count="not-urgent-important">0</span>
          <span class="quadrant-tag">plan</span>
        </span>
      </div>
      <div class="cards" data-quadrant="not-urgent-important"></div>
    </div>

    <div class="quadrant q-top-right" data-quadrant="urgent-important">
      <div class="quadrant-head">
        <span class="quadrant-label">Important · Urgent</span>
        <span class="quadrant-meta">
          <span class="quadrant-count" data-count="urgent-important">0</span>
          <span class="quadrant-tag">do now</span>
        </span>
      </div>
      <div class="cards" data-quadrant="urgent-important"></div>
    </div>

    <div class="quadrant q-bottom-left" data-quadrant="not-urgent-not-important">
      <div class="quadrant-head">
        <span class="quadrant-label">Not important · Not urgent</span>
        <span class="quadrant-meta">
          <span class="quadrant-count" data-count="not-urgent-not-important">0</span>
          <span class="quadrant-tag">drop</span>
        </span>
      </div>
      <div class="cards" data-quadrant="not-urgent-not-important"></div>
    </div>

    <div class="quadrant q-bottom-right" data-quadrant="urgent-not-important">
      <div class="quadrant-head">
        <span class="quadrant-label">Not important · Urgent</span>
        <span class="quadrant-meta">
          <span class="quadrant-count" data-count="urgent-not-important">0</span>
          <span class="quadrant-tag">delegate</span>
        </span>
      </div>
      <div class="cards" data-quadrant="urgent-not-important"></div>
    </div>
  </div>

  <div class="axis-x">
    <svg class="axis-svg" viewBox="0 0 1000 50" preserveAspectRatio="none" aria-hidden="true">
      <g filter="url(#paper-rough)" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink)">
        <path d="M 20 25 L 970 25"/>
        <path d="M 958 15 L 978 25 L 958 35"/>
      </g>
    </svg>
    <span class="axis-label">Urgency</span>
  </div>

  <aside class="tray" data-quadrant="unsorted">
    <div class="tray-head">
      <div>
        <div class="tray-title">Unsorted</div>
      </div>
      <div class="tray-hint"><span id="unsorted-count">0</span> · drag to a quadrant</div>
    </div>
    <div class="tray-cards" data-quadrant="unsorted"></div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
<script>
const PB_URL = 'https://util.croquetwade.com';
const COLLECTION = 'quadrant_tasks';

const pb = new PocketBase(PB_URL);
pb.autoCancellation(false);

// ---------- room ----------
function getRoom() {
  let room = (location.hash || '').replace(/^#/, '').trim();
  if (!room) {
    room = 'meeting-' + new Date().toISOString().slice(0,10);
    location.hash = room;
  }
  return room.replace(/[^a-z0-9-]/gi, '').toLowerCase().slice(0, 64) || 'default';
}
let ROOM = getRoom();
document.getElementById('room-name').textContent = ROOM;

// ---------- state ----------
const tasks  = new Map();
const elById = new Map();
const seen   = new Set();   // ids we've rendered before — used to gate the entry animation

const QUADRANTS = [
  'unsorted',
  'urgent-important',
  'not-urgent-important',
  'urgent-not-important',
  'not-urgent-not-important',
];

// Stable per-card rotation: hash id → -1.4° to 1.4°
function rotFor(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
  const v = ((h % 1000) / 1000) * 2 - 1;   // -1 .. 1
  return (v * 1.4).toFixed(2) + 'deg';
}

function bucketize() {
  const out = Object.fromEntries(QUADRANTS.map(q => [q, []]));
  for (const t of tasks.values()) {
    if (out[t.quadrant]) out[t.quadrant].push(t);
  }
  for (const list of Object.values(out)) {
    list.sort((a, b) => (a.created || a.id).localeCompare(b.created || b.id));
  }
  return out;
}

function render() {
  const buckets = bucketize();

  // counts
  for (const q of QUADRANTS) {
    if (q === 'unsorted') {
      document.getElementById('unsorted-count').textContent = buckets[q].length;
    } else {
      const el = document.querySelector(`.quadrant-count[data-count="${q}"]`);
      if (el) el.textContent = buckets[q].length;
    }
  }

  // FLICKER FIX:
  // - Build/reuse card elements (never re-create existing ones).
  // - Detach all from their containers, then re-append in correct order.
  //   Re-appending an existing node does NOT replay CSS animations.
  // - Only NEW ids get the .is-new class for a single paint, then it's removed.
  for (const q of QUADRANTS) {
    const container = document.querySelector(`.cards[data-quadrant="${q}"], .tray-cards[data-quadrant="${q}"]`);
    if (!container) continue;
    const list = buckets[q];

    // Clear children but keep nodes alive in elById map
    while (container.firstChild) container.removeChild(container.firstChild);

    if (list.length === 0) {
      if (q === 'unsorted') {
        const hint = document.createElement('div');
        hint.className = 'empty-hint';
        hint.innerHTML = '<span class="arrow">↑</span>Type a task above';
        container.appendChild(hint);
      }
      continue;
    }

    for (const t of list) {
      let el = elById.get(t.id);
      if (!el) {
        el = buildCard(t);
        elById.set(t.id, el);
      } else {
        // text might have changed
        const tx = el.querySelector('.card-text');
        if (tx && tx.textContent !== t.text) tx.textContent = t.text;
      }

      const isFresh = !seen.has(t.id);
      if (isFresh) {
        el.classList.add('is-new');
        seen.add(t.id);
        // strip the class after the entry animation completes
        el.addEventListener('animationend', function onEnd(ev) {
          if (ev.animationName === 'cardIn') {
            el.classList.remove('is-new');
            el.removeEventListener('animationend', onEnd);
          }
        });
      } else {
        el.classList.remove('is-new');
      }

      container.appendChild(el);
    }
  }
}

function buildCard(t) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = t.id;
  el.style.setProperty('--rot', rotFor(t.id));

  const text = document.createElement('span');
  text.className = 'card-text';
  text.textContent = t.text;
  el.appendChild(text);

  const del = document.createElement('button');
  del.className = 'card-del';
  del.title = 'Delete';
  del.setAttribute('aria-label', 'Delete task');
  del.textContent = '×';
  del.addEventListener('click', (ev) => {
    ev.stopPropagation();
    deleteTask(t.id);
  });
  el.appendChild(del);

  el.addEventListener('dragstart', (ev) => {
    el.classList.add('dragging');
    document.body.classList.add('dragging');
    ev.dataTransfer.setData('text/plain', t.id);
    ev.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.body.classList.remove('dragging');
    document.querySelectorAll('.drop-active').forEach(n => n.classList.remove('drop-active'));
  });
  return el;
}

function setupDropTargets() {
  const zones = [
    ...document.querySelectorAll('.quadrant[data-quadrant]'),
    document.querySelector('.tray[data-quadrant]'),
  ].filter(Boolean);

  for (const zone of zones) {
    zone.addEventListener('dragenter', (ev) => { ev.preventDefault(); zone.classList.add('drop-active'); });
    zone.addEventListener('dragover',  (ev) => { ev.preventDefault(); ev.dataTransfer.dropEffect = 'move'; zone.classList.add('drop-active'); });
    zone.addEventListener('dragleave', (ev) => { if (!zone.contains(ev.relatedTarget)) zone.classList.remove('drop-active'); });
    zone.addEventListener('drop', (ev) => {
      ev.preventDefault();
      zone.classList.remove('drop-active');
      const id = ev.dataTransfer.getData('text/plain');
      const newQ = zone.dataset.quadrant;
      if (!id || !newQ) return;
      moveTask(id, newQ);
    });
  }
}

async function loadAll() {
  try {
    const records = await pb.collection(COLLECTION).getFullList({
      filter: `room = "${ROOM}"`,
      sort: 'created',
    });
    tasks.clear();
    elById.clear();
    seen.clear();
    // mark existing records as "already seen" so they DON'T animate on first load
    for (const r of records) {
      tasks.set(r.id, r);
      seen.add(r.id);
    }
    render();
  } catch (err) {
    console.error('loadAll failed', err);
    showToast('Could not load tasks');
  }
}

async function addTask(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  try {
    await pb.collection(COLLECTION).create({ text: trimmed, quadrant: 'unsorted', room: ROOM });
  } catch (err) {
    console.error('add failed', err);
    showToast('Could not add task');
  }
}

async function moveTask(id, quadrant) {
  const t = tasks.get(id);
  if (!t || t.quadrant === quadrant) return;
  t.quadrant = quadrant;
  tasks.set(id, t);
  // already-seen ids do NOT animate — that's the flicker fix
  render();
  try { await pb.collection(COLLECTION).update(id, { quadrant }); }
  catch (err) { console.error(err); showToast('Could not move task'); loadAll(); }
}

async function deleteTask(id) {
  if (!tasks.has(id)) return;
  const el = elById.get(id);
  if (el) { el.classList.add('removing'); await new Promise(r => setTimeout(r, 200)); }
  tasks.delete(id);
  elById.delete(id);
  seen.delete(id);
  render();
  try { await pb.collection(COLLECTION).delete(id); }
  catch (err) { console.error(err); showToast('Could not delete task'); loadAll(); }
}

async function clearRoom() {
  if (!confirm(`Clear all tasks in room "${ROOM}"? This cannot be undone.`)) return;
  const ids = [...tasks.keys()];
  tasks.clear(); elById.clear(); seen.clear(); render();
  for (const id of ids) { try { await pb.collection(COLLECTION).delete(id); } catch {} }
  showToast('Room cleared');
}

function setLive(ok, text) {
  const live = document.getElementById('live');
  live.classList.toggle('dead', !ok);
  document.getElementById('live-text').textContent = text || (ok ? 'live' : 'reconnecting');
}

async function subscribe() {
  try {
    await pb.collection(COLLECTION).subscribe('*', (e) => {
      const r = e.record;
      if (!r || r.room !== ROOM) return;
      if (e.action === 'create' || e.action === 'update') {
        tasks.set(r.id, r);
      } else if (e.action === 'delete') {
        tasks.delete(r.id); elById.delete(r.id); seen.delete(r.id);
      }
      render();
    });
    setLive(true, 'live');
  } catch (err) {
    console.error('subscribe failed', err);
    setLive(false, 'offline — reload');
  }
}

const addForm  = document.getElementById('add-form');
const addInput = document.getElementById('add-input');
addForm.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const v = addInput.value;
  addInput.value = '';
  addInput.focus();
  await addTask(v);
});

document.getElementById('clear-btn').addEventListener('click', clearRoom);
document.getElementById('copy-btn').addEventListener('click', async () => {
  const url = location.href;
  try { await navigator.clipboard.writeText(url); showToast('Link copied'); }
  catch { showToast(url); }
});
document.getElementById('rename-btn').addEventListener('click', () => {
  const next = prompt('Room name (letters/numbers/dashes):', ROOM);
  if (!next) return;
  location.hash = next.trim();
});

window.addEventListener('hashchange', async () => {
  ROOM = getRoom();
  document.getElementById('room-name').textContent = ROOM;
  try { await pb.collection(COLLECTION).unsubscribe('*'); } catch {}
  tasks.clear(); elById.clear(); seen.clear(); render();
  await loadAll();
  await subscribe();
});

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

setupDropTargets();
render();
(async () => { await loadAll(); await subscribe(); })();
</script>
</body>
</html>
