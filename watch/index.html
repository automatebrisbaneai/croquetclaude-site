<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude is working — CroquetClaude</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Courier New', Courier, monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    overflow: hidden;
  }

  .wordmark {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c4784a;
    opacity: 0.7;
  }

  #pixel-office {
    width: min(600px, 90vw);
    height: min(500px, 70vh);
    border: 1px solid rgba(196,120,74,0.35);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    background: #1a1a1a;
  }

  #pixel-office canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  .footer {
    font-size: 10px;
    color: #4a5568;
    letter-spacing: 0.1em;
  }

  .footer a { color: #c4784a; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  @media (prefers-reduced-motion: reduce) {
    #pixel-office { display: none; }
  }
</style>
</head>
<body>

<div class="wordmark">CroquetClaude</div>

<div id="pixel-office"
     data-replay-src="replay.json"
     data-assets-base="pixel-office/assets/"></div>

<div class="footer">
  Real work from real sessions &mdash; <a href="https://croquetclaude.com">croquetclaude.com</a>
</div>

<script src="pixel-office/bundle.js" defer></script>

</body>
</html>
